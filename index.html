<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MD 최저가 체커</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #12121a;
            --bg-card: #1a1a25;
            --bg-hover: #222230;
            --accent-green: #00ff88;
            --accent-green-dim: rgba(0, 255, 136, 0.1);
            --accent-blue: #00d4ff;
            --accent-orange: #ff6b35;
            --accent-yellow: #ffd000;
            --text-primary: #ffffff;
            --text-secondary: #8a8a9a;
            --text-dim: #5a5a6a;
            --border-color: #2a2a3a;
            --danger: #ff4757;
            --success: #2ed573;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans KR', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            line-height: 1.6;
        }

        .header {
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border-color);
            padding: 1rem 2rem;
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(10px);
        }

        .header-content {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 2rem;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .logo-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--accent-green), var(--accent-blue));
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            font-size: 1.2rem;
        }

        .logo-text {
            font-weight: 700;
            font-size: 1.3rem;
            letter-spacing: -0.5px;
        }

        .logo-text span {
            color: var(--accent-green);
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
        }

        .search-section {
            margin-bottom: 2rem;
        }

        .search-box {
            position: relative;
            max-width: 700px;
            margin: 0 auto;
        }

        .search-input {
            width: 100%;
            padding: 1.2rem 1.5rem 1.2rem 3.5rem;
            font-size: 1.1rem;
            background: var(--bg-secondary);
            border: 2px solid var(--border-color);
            border-radius: 16px;
            color: var(--text-primary);
            font-family: inherit;
            transition: all 0.3s;
        }

        .search-input:focus {
            outline: none;
            border-color: var(--accent-green);
            box-shadow: 0 0 0 4px var(--accent-green-dim);
        }

        .search-input::placeholder {
            color: var(--text-dim);
        }

        .search-icon {
            position: absolute;
            left: 1.2rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-dim);
            font-size: 1.2rem;
        }

        .search-btn {
            position: absolute;
            right: 8px;
            top: 50%;
            transform: translateY(-50%);
            background: linear-gradient(135deg, var(--accent-green), #00cc6a);
            border: none;
            color: var(--bg-primary);
            padding: 0.8rem 1.5rem;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            font-size: 0.95rem;
            transition: all 0.2s;
        }

        .search-btn:hover {
            transform: translateY(-50%) scale(1.02);
            box-shadow: 0 4px 20px rgba(0, 255, 136, 0.3);
        }

        .search-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .stats-bar {
            display: flex;
            gap: 1.5rem;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
        }

        .stat-item {
            background: var(--bg-secondary);
            padding: 1rem 1.5rem;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .stat-icon {
            width: 36px;
            height: 36px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
        }

        .stat-icon.green { background: var(--accent-green-dim); color: var(--accent-green); }
        .stat-icon.blue { background: rgba(0, 212, 255, 0.1); color: var(--accent-blue); }
        .stat-icon.orange { background: rgba(255, 107, 53, 0.1); color: var(--accent-orange); }

        .stat-content {
            display: flex;
            flex-direction: column;
        }

        .stat-label {
            font-size: 0.75rem;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .stat-value {
            font-size: 1.1rem;
            font-weight: 700;
            font-family: 'JetBrains Mono', monospace;
        }

        .results-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
            padding: 0 0.5rem;
        }

        .results-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text-secondary);
        }

        .sort-info {
            font-size: 0.85rem;
            color: var(--accent-green);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .product-table {
            background: var(--bg-secondary);
            border-radius: 16px;
            border: 1px solid var(--border-color);
            overflow: hidden;
        }

        .table-header {
            display: grid;
            grid-template-columns: 60px 1fr 150px 180px 150px;
            gap: 1rem;
            padding: 1rem 1.5rem;
            background: var(--bg-card);
            border-bottom: 1px solid var(--border-color);
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .product-row {
            display: grid;
            grid-template-columns: 60px 1fr 150px 180px 150px;
            gap: 1rem;
            padding: 1.2rem 1.5rem;
            border-bottom: 1px solid var(--border-color);
            align-items: center;
            transition: all 0.2s;
        }

        .product-row:last-child {
            border-bottom: none;
        }

        .product-row:hover {
            background: var(--bg-hover);
        }

        .rank {
            font-family: 'JetBrains Mono', monospace;
            font-weight: 700;
            font-size: 1.1rem;
            color: var(--text-dim);
        }

        .rank.top-3 {
            color: var(--accent-green);
        }

        .product-info {
            display: flex;
            align-items: center;
            gap: 1rem;
            min-width: 0;
        }

        .product-image {
            width: 56px;
            height: 56px;
            border-radius: 10px;
            background: var(--bg-card);
            object-fit: cover;
            flex-shrink: 0;
        }

        .product-details {
            min-width: 0;
        }

        .product-name {
            font-weight: 500;
            font-size: 0.95rem;
            color: var(--text-primary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 0.25rem;
            cursor: pointer;
            transition: color 0.2s;
        }

        .product-name:hover {
            color: var(--accent-green);
        }

        .product-category {
            font-size: 0.8rem;
            color: var(--text-dim);
        }

        .platform {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .platform-badge {
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            font-size: 0.8rem;
            font-weight: 500;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
        }

        .platform-badge.naver { border-color: #03c75a; color: #03c75a; }
        .platform-badge.coupang { border-color: #ff5722; color: #ff5722; }
        .platform-badge.gmarket { border-color: #00a0e0; color: #00a0e0; }
        .platform-badge.auction { border-color: #ff6b35; color: #ff6b35; }
        .platform-badge.ssg { border-color: #ff5a5a; color: #ff5a5a; }
        .platform-badge.wemakeprice { border-color: #ff4f4f; color: #ff4f4f; }
        .platform-badge.tmon { border-color: #ff6f61; color: #ff6f61; }
        .platform-badge.st { border-color: #ff0038; color: #ff0038; }

        .price-cell {
            text-align: right;
        }

        .price-main {
            font-family: 'JetBrains Mono', monospace;
            font-weight: 700;
            font-size: 1.1rem;
            color: var(--text-primary);
        }

        .price-original {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.8rem;
            color: var(--text-dim);
            text-decoration: line-through;
            margin-top: 0.2rem;
        }

        .final-price {
            text-align: right;
        }

        .final-price-value {
            font-family: 'JetBrains Mono', monospace;
            font-weight: 900;
            font-size: 1.2rem;
            color: var(--accent-green);
        }

        .final-price-label {
            font-size: 0.7rem;
            color: var(--text-dim);
            margin-top: 0.2rem;
        }

        .loading {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 4rem;
            color: var(--text-dim);
        }

        .spinner {
            width: 48px;
            height: 48px;
            border: 3px solid var(--border-color);
            border-top-color: var(--accent-green);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 1rem;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            color: var(--text-dim);
        }

        .empty-icon {
            font-size: 4rem;
            margin-bottom: 1rem;
            opacity: 0.5;
        }

        .empty-title {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: var(--text-secondary);
        }

        .toast {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            padding: 1rem 1.5rem;
            border-radius: 12px;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            transition: transform 0.3s;
            z-index: 1001;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
        }

        .toast.success { border-color: var(--success); }
        .toast.error { border-color: var(--danger); }

        @media (max-width: 1000px) {
            .table-header,
            .product-row {
                grid-template-columns: 50px 1fr 120px 140px 120px;
                gap: 0.75rem;
                padding: 1rem;
            }
        }

        @media (max-width: 768px) {
            .table-header {
                display: none;
            }

            .product-row {
                grid-template-columns: 1fr;
                gap: 0.75rem;
                padding: 1.5rem;
                position: relative;
            }

            .rank {
                position: absolute;
                top: 1rem;
                right: 1rem;
                background: var(--bg-card);
                padding: 0.3rem 0.6rem;
                border-radius: 6px;
            }

            .price-cell,
            .final-price {
                text-align: left;
            }

            .stats-bar {
                flex-direction: column;
            }

            .container {
                padding: 1rem;
            }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-content">
            <div class="logo">
                <div class="logo-icon">₩</div>
                <div class="logo-text">MD <span>Price Checker</span></div>
            </div>
        </div>
    </header>

    <main class="container">
        <section class="search-section">
            <div class="search-box">
                <span class="search-icon">🔍</span>
                <input 
                    type="text" 
                    class="search-input" 
                    id="searchInput"
                    placeholder="상품명을 입력하세요 (예: 에어팟 프로, 다이슨 에어랩)"
                    onkeypress="handleKeyPress(event)"
                >
                <button class="search-btn" id="searchBtn" onclick="searchProducts()">검색</button>
            </div>
        </section>

        <div class="stats-bar" id="statsBar" style="display: none;">
            <div class="stat-item">
                <div class="stat-icon green">📊</div>
                <div class="stat-content">
                    <span class="stat-label">검색 결과</span>
                    <span class="stat-value" id="totalCount">0개</span>
                </div>
            </div>
            <div class="stat-item">
                <div class="stat-icon blue">💰</div>
                <div class="stat-content">
                    <span class="stat-label">최저가</span>
                    <span class="stat-value" id="lowestPrice">-</span>
                </div>
            </div>
            <div class="stat-item">
                <div class="stat-icon orange">📈</div>
                <div class="stat-content">
                    <span class="stat-label">평균가</span>
                    <span class="stat-value" id="avgPrice">-</span>
                </div>
            </div>
        </div>

        <section class="results-section">
            <div class="results-header" id="resultsHeader" style="display: none;">
                <h2 class="results-title">검색 결과</h2>
                <div class="sort-info">
                    <span>▼</span> 최저가순 정렬
                </div>
            </div>

            <div class="product-table" id="productTable">
                <div class="empty-state" id="emptyState">
                    <div class="empty-icon">🔍</div>
                    <div class="empty-title">상품을 검색해보세요</div>
                    <p>검색창에 상품명을 입력하면 네이버 쇼핑에서<br>최저가 TOP 20을 찾아드립니다.</p>
                </div>
            </div>
        </section>
    </main>

    <div class="toast" id="toast">
        <span id="toastMessage"></span>
    </div>

    <script>
        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            const toastMessage = document.getElementById('toastMessage');
            
            toast.className = `toast ${type}`;
            toastMessage.textContent = message;
            toast.classList.add('show');

            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                searchProducts();
            }
        }

        async function searchProducts() {
            const query = document.getElementById('searchInput').value.trim();
            
            if (!query) {
                showToast('검색어를 입력해주세요.', 'error');
                return;
            }

            const searchBtn = document.getElementById('searchBtn');
            searchBtn.disabled = true;
            searchBtn.textContent = '검색중...';

            document.getElementById('productTable').innerHTML = `
                <div class="loading">
                    <div class="spinner"></div>
                    <span>최저가 상품을 검색하고 있습니다...</span>
                </div>
            `;

            try {
                const response = await fetch(`/api/search?query=${encodeURIComponent(query)}`);
                
                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(errorData.error || 'API 호출 실패');
                }

                const data = await response.json();
                displayResults(data.items || []);

            } catch (error) {
                console.error('Search error:', error);
                document.getElementById('productTable').innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">❌</div>
                        <div class="empty-title">검색 실패</div>
                        <p>${error.message}</p>
                    </div>
                `;
                showToast(error.message, 'error');
            } finally {
                searchBtn.disabled = false;
                searchBtn.textContent = '검색';
            }
        }

        function getPlatformClass(mallName) {
            const name = mallName.toLowerCase();
            if (name.includes('네이버') || name.includes('naver')) return 'naver';
            if (name.includes('쿠팡') || name.includes('coupang')) return 'coupang';
            if (name.includes('g마켓') || name.includes('gmarket')) return 'gmarket';
            if (name.includes('옥션') || name.includes('auction')) return 'auction';
            if (name.includes('ssg') || name.includes('신세계')) return 'ssg';
            if (name.includes('위메프')) return 'wemakeprice';
            if (name.includes('티몬')) return 'tmon';
            if (name.includes('11번가')) return 'st';
            return '';
        }

        function displayResults(items) {
            if (!items || items.length === 0) {
                document.getElementById('productTable').innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">😕</div>
                        <div class="empty-title">검색 결과가 없습니다</div>
                        <p>다른 검색어로 다시 시도해보세요.</p>
                    </div>
                `;
                document.getElementById('statsBar').style.display = 'none';
                document.getElementById('resultsHeader').style.display = 'none';
                return;
            }

            items.sort((a, b) => parseInt(a.lprice) - parseInt(b.lprice));

            const prices = items.map(item => parseInt(item.lprice));
            const lowestPrice = Math.min(...prices);
            const avgPrice = Math.round(prices.reduce((a, b) => a + b, 0) / prices.length);

            document.getElementById('statsBar').style.display = 'flex';
            document.getElementById('resultsHeader').style.display = 'flex';
            document.getElementById('totalCount').textContent = `${items.length}개`;
            document.getElementById('lowestPrice').textContent = formatPrice(lowestPrice);
            document.getElementById('avgPrice').textContent = formatPrice(avgPrice);

            let html = `
                <div class="table-header">
                    <div>순위</div>
                    <div>상품정보</div>
                    <div>플랫폼</div>
                    <div>판매가</div>
                    <div>최저가</div>
                </div>
            `;

            items.forEach((item, index) => {
                const price = parseInt(item.lprice);
                const cleanTitle = item.title.replace(/<[^>]*>/g, '');
                const platformClass = getPlatformClass(item.mallName);

                html += `
                    <div class="product-row">
                        <div class="rank ${index < 3 ? 'top-3' : ''}">${index + 1}</div>
                        <div class="product-info">
                            <img src="${item.image || 'https://via.placeholder.com/56'}" 
                                 alt="${cleanTitle}" 
                                 class="product-image"
                                 onerror="this.src='https://via.placeholder.com/56/1a1a25/00ff88?text=IMG'">
                            <div class="product-details">
                                <div class="product-name" onclick="window.open('${item.link}', '_blank')">${cleanTitle}</div>
                                <div class="product-category">${item.brand || item.maker || item.category1 || ''}</div>
                            </div>
                        </div>
                        <div class="platform">
                            <span class="platform-badge ${platformClass}">${item.mallName}</span>
                        </div>
                        <div class="price-cell">
                            <div class="price-main">${formatPrice(price)}</div>
                            ${item.hprice && parseInt(item.hprice) > price ? `<div class="price-original">${formatPrice(parseInt(item.hprice))}</div>` : ''}
                        </div>
                        <div class="final-price">
                            <div class="final-price-value">${formatPrice(price)}</div>
                            <div class="final-price-label">최저가</div>
                        </div>
                    </div>
                `;
            });

            document.getElementById('productTable').innerHTML = html;
        }

        function formatPrice(price) {
            return new Intl.NumberFormat('ko-KR').format(price) + '원';
        }
    </script>
</body>
</html>
