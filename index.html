<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MD 최저가 체커 - 패션</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #12121a;
            --bg-card: #1a1a25;
            --bg-hover: #222230;
            --accent-green: #00ff88;
            --accent-green-dim: rgba(0, 255, 136, 0.1);
            --accent-blue: #00d4ff;
            --accent-orange: #ff6b35;
            --accent-yellow: #ffd000;
            --accent-pink: #ff6b9d;
            --text-primary: #ffffff;
            --text-secondary: #8a8a9a;
            --text-dim: #5a5a6a;
            --border-color: #2a2a3a;
            --danger: #ff4757;
            --success: #2ed573;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans KR', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            line-height: 1.6;
        }

        .header {
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border-color);
            padding: 1rem 2rem;
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(10px);
        }

        .header-content {
            max-width: 1600px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 2rem;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .logo-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--accent-pink), var(--accent-orange));
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            font-size: 1.2rem;
        }

        .logo-text {
            font-weight: 700;
            font-size: 1.3rem;
            letter-spacing: -0.5px;
        }

        .logo-text span {
            color: var(--accent-pink);
        }

        .badge {
            background: var(--accent-pink);
            color: white;
            padding: 0.2rem 0.6rem;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 600;
            margin-left: 0.5rem;
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
            padding: 2rem;
        }

        .search-section {
            margin-bottom: 2rem;
        }

        .search-box {
            position: relative;
            max-width: 700px;
            margin: 0 auto;
        }

        .search-input {
            width: 100%;
            padding: 1.2rem 1.5rem 1.2rem 3.5rem;
            font-size: 1.1rem;
            background: var(--bg-secondary);
            border: 2px solid var(--border-color);
            border-radius: 16px;
            color: var(--text-primary);
            font-family: inherit;
            transition: all 0.3s;
        }

        .search-input:focus {
            outline: none;
            border-color: var(--accent-pink);
            box-shadow: 0 0 0 4px rgba(255, 107, 157, 0.1);
        }

        .search-input::placeholder {
            color: var(--text-dim);
        }

        .search-icon {
            position: absolute;
            left: 1.2rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-dim);
            font-size: 1.2rem;
        }

        .search-btn {
            position: absolute;
            right: 8px;
            top: 50%;
            transform: translateY(-50%);
            background: linear-gradient(135deg, var(--accent-pink), var(--accent-orange));
            border: none;
            color: white;
            padding: 0.8rem 1.5rem;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            font-size: 0.95rem;
            transition: all 0.2s;
        }

        .search-btn:hover {
            transform: translateY(-50%) scale(1.02);
            box-shadow: 0 4px 20px rgba(255, 107, 157, 0.3);
        }

        .search-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .stats-bar {
            display: flex;
            gap: 1.5rem;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
        }

        .stat-item {
            background: var(--bg-secondary);
            padding: 1rem 1.5rem;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .stat-icon {
            width: 36px;
            height: 36px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
        }

        .stat-icon.green { background: var(--accent-green-dim); color: var(--accent-green); }
        .stat-icon.blue { background: rgba(0, 212, 255, 0.1); color: var(--accent-blue); }
        .stat-icon.orange { background: rgba(255, 107, 53, 0.1); color: var(--accent-orange); }
        .stat-icon.pink { background: rgba(255, 107, 157, 0.1); color: var(--accent-pink); }

        .stat-content {
            display: flex;
            flex-direction: column;
        }

        .stat-label {
            font-size: 0.75rem;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .stat-value {
            font-size: 1.1rem;
            font-weight: 700;
            font-family: 'JetBrains Mono', monospace;
        }

        .results-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
            padding: 0 0.5rem;
        }

        .results-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text-secondary);
        }

        .sort-info {
            font-size: 0.85rem;
            color: var(--accent-pink);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .product-table {
            background: var(--bg-secondary);
            border-radius: 16px;
            border: 1px solid var(--border-color);
            overflow: hidden;
        }

        .table-header {
            display: grid;
            grid-template-columns: 50px 1fr 100px 130px 100px 140px;
            gap: 0.75rem;
            padding: 1rem 1.5rem;
            background: var(--bg-card);
            border-bottom: 1px solid var(--border-color);
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .product-row {
            display: grid;
            grid-template-columns: 50px 1fr 100px 130px 100px 140px;
            gap: 0.75rem;
            padding: 1rem 1.5rem;
            border-bottom: 1px solid var(--border-color);
            align-items: center;
            transition: all 0.2s;
        }

        .product-row:last-child {
            border-bottom: none;
        }

        .product-row:hover {
            background: var(--bg-hover);
        }

        .rank {
            font-family: 'JetBrains Mono', monospace;
            font-weight: 700;
            font-size: 1rem;
            color: var(--text-dim);
        }

        .rank.top-3 {
            color: var(--accent-pink);
        }

        .product-info {
            display: flex;
            align-items: center;
            gap: 1rem;
            min-width: 0;
        }

        .product-image {
            width: 52px;
            height: 52px;
            border-radius: 10px;
            background: var(--bg-card);
            object-fit: cover;
            flex-shrink: 0;
        }

        .product-details {
            min-width: 0;
        }

        .product-name {
            font-weight: 500;
            font-size: 0.9rem;
            color: var(--text-primary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 0.25rem;
            cursor: pointer;
            transition: color 0.2s;
        }

        .product-name:hover {
            color: var(--accent-pink);
        }

        .product-category {
            font-size: 0.75rem;
            color: var(--text-dim);
        }

        .platform {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .platform-logo {
            height: 24px;
            max-width: 80px;
            object-fit: contain;
        }

        .platform-text {
            padding: 0.3rem 0.6rem;
            border-radius: 6px;
            font-size: 0.7rem;
            font-weight: 500;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            text-align: center;
            max-width: 80px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .price-cell {
            text-align: right;
        }

        .price-main {
            font-family: 'JetBrains Mono', monospace;
            font-weight: 600;
            font-size: 0.95rem;
            color: var(--text-primary);
        }

        .delivery-cell {
            text-align: right;
        }

        .delivery-free {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--accent-green);
        }

        .delivery-cost {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85rem;
            color: var(--accent-orange);
        }

        .total-price {
            text-align: right;
        }

        .total-price-value {
            font-family: 'JetBrains Mono', monospace;
            font-weight: 900;
            font-size: 1.1rem;
            color: var(--accent-green);
        }

        .total-price-label {
            font-size: 0.65rem;
            color: var(--text-dim);
            margin-top: 0.15rem;
        }

        .loading {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 4rem;
            color: var(--text-dim);
        }

        .spinner {
            width: 48px;
            height: 48px;
            border: 3px solid var(--border-color);
            border-top-color: var(--accent-pink);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 1rem;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            color: var(--text-dim);
        }

        .empty-icon {
            font-size: 4rem;
            margin-bottom: 1rem;
            opacity: 0.5;
        }

        .empty-title {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: var(--text-secondary);
        }

        .toast {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            padding: 1rem 1.5rem;
            border-radius: 12px;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            transition: transform 0.3s;
            z-index: 1001;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
        }

        .toast.success { border-color: var(--success); }
        .toast.error { border-color: var(--danger); }

        @media (max-width: 1100px) {
            .table-header,
            .product-row {
                grid-template-columns: 40px 1fr 90px 110px 90px 120px;
                gap: 0.5rem;
                padding: 0.8rem 1rem;
            }
        }

        @media (max-width: 768px) {
            .table-header {
                display: none;
            }

            .product-row {
                grid-template-columns: 1fr 1fr;
                gap: 0.75rem;
                padding: 1.2rem;
                position: relative;
            }

            .rank {
                position: absolute;
                top: 0.8rem;
                right: 0.8rem;
                background: var(--bg-card);
                padding: 0.2rem 0.5rem;
                border-radius: 6px;
                font-size: 0.85rem;
            }

            .product-info {
                grid-column: 1 / -1;
            }

            .platform {
                justify-content: flex-start;
            }

            .price-cell,
            .delivery-cell,
            .total-price {
                text-align: left;
            }

            .stats-bar {
                flex-direction: column;
            }

            .container {
                padding: 1rem;
            }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-content">
            <div class="logo">
                <div class="logo-icon">👗</div>
                <div class="logo-text">MD <span>Price Checker</span></div>
                <span class="badge">FASHION</span>
            </div>
        </div>
    </header>

    <main class="container">
        <section class="search-section">
            <div class="search-box">
                <span class="search-icon">🔍</span>
                <input 
                    type="text" 
                    class="search-input" 
                    id="searchInput"
                    placeholder="패션 상품명을 입력하세요 (예: 나이키 에어포스, 구찌 가방)"
                    onkeypress="handleKeyPress(event)"
                >
                <button class="search-btn" id="searchBtn" onclick="searchProducts()">검색</button>
            </div>
        </section>

        <div class="stats-bar" id="statsBar" style="display: none;">
            <div class="stat-item">
                <div class="stat-icon pink">📊</div>
                <div class="stat-content">
                    <span class="stat-label">검색 결과</span>
                    <span class="stat-value" id="totalCount">0개</span>
                </div>
            </div>
            <div class="stat-item">
                <div class="stat-icon green">💰</div>
                <div class="stat-content">
                    <span class="stat-label">최저가 (배송비 포함)</span>
                    <span class="stat-value" id="lowestPrice">-</span>
                </div>
            </div>
            <div class="stat-item">
                <div class="stat-icon orange">📈</div>
                <div class="stat-content">
                    <span class="stat-label">평균가</span>
                    <span class="stat-value" id="avgPrice">-</span>
                </div>
            </div>
            <div class="stat-item">
                <div class="stat-icon blue">🚚</div>
                <div class="stat-content">
                    <span class="stat-label">무료배송</span>
                    <span class="stat-value" id="freeDeliveryCount">0개</span>
                </div>
            </div>
        </div>

        <section class="results-section">
            <div class="results-header" id="resultsHeader" style="display: none;">
                <h2 class="results-title">패션 검색 결과</h2>
                <div class="sort-info">
                    <span>▼</span> 총 결제가순 정렬 (배송비 포함)
                </div>
            </div>

            <div class="product-table" id="productTable">
                <div class="empty-state" id="emptyState">
                    <div class="empty-icon">👗</div>
                    <div class="empty-title">패션 상품을 검색해보세요</div>
                    <p>검색창에 상품명을 입력하면<br>패션 카테고리에서 최저가 TOP 100을 찾아드립니다.</p>
                </div>
            </div>
        </section>
    </main>

    <div class="toast" id="toast">
        <span id="toastMessage"></span>
    </div>

    <script>
        const platformLogos = {
            '네이버': 'https://logoproject.naver.com/img/img_story_renewal.png',
            'naver': 'https://logoproject.naver.com/img/img_story_renewal.png',
            '쿠팡': 'https://image7.coupangcdn.com/image/coupang/common/logo_coupang_w350.png',
            'coupang': 'https://image7.coupangcdn.com/image/coupang/common/logo_coupang_w350.png',
            'g마켓': 'https://upload.wikimedia.org/wikipedia/commons/thumb/5/5f/Gmarket_logo.svg/512px-Gmarket_logo.svg.png',
            'gmarket': 'https://upload.wikimedia.org/wikipedia/commons/thumb/5/5f/Gmarket_logo.svg/512px-Gmarket_logo.svg.png',
            '옥션': 'https://upload.wikimedia.org/wikipedia/commons/thumb/4/4c/Auction_logo.svg/512px-Auction_logo.svg.png',
            'auction': 'https://upload.wikimedia.org/wikipedia/commons/thumb/4/4c/Auction_logo.svg/512px-Auction_logo.svg.png',
            '11번가': 'https://upload.wikimedia.org/wikipedia/commons/thumb/e/e2/11st_logo.svg/512px-11st_logo.svg.png',
            '11st': 'https://upload.wikimedia.org/wikipedia/commons/thumb/e/e2/11st_logo.svg/512px-11st_logo.svg.png',
            'ssg': 'https://upload.wikimedia.org/wikipedia/commons/thumb/a/a8/SSG.COM_Logo.svg/512px-SSG.COM_Logo.svg.png',
            '신세계': 'https://upload.wikimedia.org/wikipedia/commons/thumb/a/a8/SSG.COM_Logo.svg/512px-SSG.COM_Logo.svg.png',
            '위메프': 'https://upload.wikimedia.org/wikipedia/commons/thumb/5/5e/Wemakeprice_logo.svg/512px-Wemakeprice_logo.svg.png',
            'wemakeprice': 'https://upload.wikimedia.org/wikipedia/commons/thumb/5/5e/Wemakeprice_logo.svg/512px-Wemakeprice_logo.svg.png',
            '티몬': 'https://upload.wikimedia.org/wikipedia/commons/thumb/0/08/TMON_logo.svg/512px-TMON_logo.svg.png',
            'tmon': 'https://upload.wikimedia.org/wikipedia/commons/thumb/0/08/TMON_logo.svg/512px-TMON_logo.svg.png',
            '무신사': 'https://image.msscdn.net/mfile_s01/fb/share_musinsa.png',
            '에이블리': 'https://image.a-bly.com/branding/ably_logo_og.png',
            '지그재그': 'https://cf.channel.io/thumb/200x200/pub-file/1/606d8256e5182a007a17/ch-symbol-filled-bg.png',
            'w컨셉': 'https://upload.wikimedia.org/wikipedia/commons/thumb/8/8c/W_Concept_logo.svg/512px-W_Concept_logo.svg.png',
            '하이버': 'https://upload.wikimedia.org/wikipedia/commons/thumb/6/6f/Hiver_logo.svg/512px-Hiver_logo.svg.png',
            '스타일쉐어': 'https://upload.wikimedia.org/wikipedia/commons/thumb/0/0e/StyleShare_logo.svg/512px-StyleShare_logo.svg.png',
            '브랜디': 'https://cf.channel.io/thumb/200x200/pub-file/1/606d8256e5182a007a17/ch-symbol-filled-bg.png',
            '인터파크': 'https://upload.wikimedia.org/wikipedia/commons/thumb/7/78/Interpark_logo.svg/512px-Interpark_logo.svg.png',
            '롯데온': 'https://www.lotteon.com/p/display/shop/static/image/icon/logo_bi_lotteon_v3.svg',
            '카카오': 'https://t1.kakaocdn.net/kakaocorp/kakaocorp/admin/5f5c1882017800001.png',
        };

        function getPlatformLogo(mallName) {
            const name = mallName.toLowerCase();
            for (const [key, url] of Object.entries(platformLogos)) {
                if (name.includes(key.toLowerCase())) {
                    return url;
                }
            }
            return null;
        }

        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            const toastMessage = document.getElementById('toastMessage');
            toast.className = `toast ${type}`;
            toastMessage.textContent = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        function handleKeyPress(event) {
            if (event.key === 'Enter') searchProducts();
        }

        async function searchProducts() {
            const query = document.getElementById('searchInput').value.trim();
            
            if (!query) {
                showToast('검색어를 입력해주세요.', 'error');
                return;
            }

            const searchBtn = document.getElementById('searchBtn');
            searchBtn.disabled = true;
            searchBtn.textContent = '검색중...';

            document.getElementById('productTable').innerHTML = `
                <div class="loading">
                    <div class="spinner"></div>
                    <span>패션 상품을 검색하고 있습니다...</span>
                </div>
            `;

            try {
                const response = await fetch(`/api/search?query=${encodeURIComponent(query)}`);
                
                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(errorData.error || 'API 호출 실패');
                }

                const data = await response.json();
                displayResults(data.items || []);

            } catch (error) {
                console.error('Search error:', error);
                document.getElementById('productTable').innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">❌</div>
                        <div class="empty-title">검색 실패</div>
                        <p>${error.message}</p>
                    </div>
                `;
                showToast(error.message, 'error');
            } finally {
                searchBtn.disabled = false;
                searchBtn.textContent = '검색';
            }
        }

        function displayResults(items) {
            if (!items || items.length === 0) {
                document.getElementById('productTable').innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">😕</div>
                        <div class="empty-title">패션 카테고리에서 검색 결과가 없습니다</div>
                        <p>다른 검색어로 다시 시도해보세요.</p>
                    </div>
                `;
                document.getElementById('statsBar').style.display = 'none';
                document.getElementById('resultsHeader').style.display = 'none';
                return;
            }

            // 배송비 포함 총액으로 정렬
            items.sort((a, b) => {
                const totalA = parseInt(a.lprice) + parseInt(a.delivery || 0);
                const totalB = parseInt(b.lprice) + parseInt(b.delivery || 0);
                return totalA - totalB;
            });

            // 통계 계산
            const totals = items.map(item => parseInt(item.lprice) + parseInt(item.delivery || 0));
            const lowestTotal = Math.min(...totals);
            const avgTotal = Math.round(totals.reduce((a, b) => a + b, 0) / totals.length);
            const freeDeliveryCount = items.filter(item => !item.delivery || item.delivery === '0').length;

            document.getElementById('statsBar').style.display = 'flex';
            document.getElementById('resultsHeader').style.display = 'flex';
            document.getElementById('totalCount').textContent = `${items.length}개`;
            document.getElementById('lowestPrice').textContent = formatPrice(lowestTotal);
            document.getElementById('avgPrice').textContent = formatPrice(avgTotal);
            document.getElementById('freeDeliveryCount').textContent = `${freeDeliveryCount}개`;

            let html = `
                <div class="table-header">
                    <div>순위</div>
                    <div>상품정보</div>
                    <div>플랫폼</div>
                    <div>상품가</div>
                    <div>배송비</div>
                    <div>총 결제가</div>
                </div>
            `;

            items.forEach((item, index) => {
                const price = parseInt(item.lprice);
                const delivery = parseInt(item.delivery || 0);
                const totalPrice = price + delivery;
                const cleanTitle = item.title.replace(/<[^>]*>/g, '');
                const logoUrl = getPlatformLogo(item.mallName);

                const platformHtml = logoUrl 
                    ? `<img src="${logoUrl}" alt="${item.mallName}" class="platform-logo" onerror="this.outerHTML='<span class=\\'platform-text\\'>${item.mallName}</span>'">`
                    : `<span class="platform-text">${item.mallName}</span>`;

                const deliveryHtml = delivery === 0 
                    ? `<span class="delivery-free">무료배송</span>`
                    : `<span class="delivery-cost">+${formatPrice(delivery)}</span>`;

                html += `
                    <div class="product-row">
                        <div class="rank ${index < 3 ? 'top-3' : ''}">${index + 1}</div>
                        <div class="product-info">
                            <img src="${item.image || 'https://via.placeholder.com/52'}" 
                                 alt="${cleanTitle}" 
                                 class="product-image"
                                 onerror="this.src='https://via.placeholder.com/52/1a1a25/ff6b9d?text=IMG'">
                            <div class="product-details">
                                <div class="product-name" onclick="window.open('${item.link}', '_blank')">${cleanTitle}</div>
                                <div class="product-category">${item.brand || item.maker || item.category2 || ''}</div>
                            </div>
                        </div>
                        <div class="platform">
                            ${platformHtml}
                        </div>
                        <div class="price-cell">
                            <div class="price-main">${formatPrice(price)}</div>
                        </div>
                        <div class="delivery-cell">
                            ${deliveryHtml}
                        </div>
                        <div class="total-price">
                            <div class="total-price-value">${formatPrice(totalPrice)}</div>
                            <div class="total-price-label">배송비 포함</div>
                        </div>
                    </div>
                `;
            });

            document.getElementById('productTable').innerHTML = html;
        }

        function formatPrice(price) {
            return new Intl.NumberFormat('ko-KR').format(price) + '원';
        }
    </script>
</body>
</html>
